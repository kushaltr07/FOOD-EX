<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background: url("{{ url_for('static', filename='images/Restaurant.jpg') }}") no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
        }

        .checkout-box{
            background: rgba(255,255,255,0.95);
            padding: 35px;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(0,0,0,0.3);
            max-width: 700px;
            margin: 50px auto;
        }

        h2{
            color: #d35400;
            font-weight: bold;
        }

        .btn-success{
            width: 100%;
            font-size: 18px;
        }
    </style>

</head>
<body>

<div class="container">

    <div class="checkout-box">

        <h2 class="text-center mb-4">Checkout</h2>

        <form action="{{ url_for('place_order') }}" method="POST">

            <div class="mb-3">
                <label class="form-label"><strong>Customer Name</strong></label>
                <input type="text" class="form-control" name="name" required>
            </div>

            <div class="mb-3">
                <label class="form-label"><strong>Phone Number</strong></label>
                <input type="tel" class="form-control" name="phone" required>
            </div>

            <div class="mb-3">
                <label class="form-label"><strong>Delivery Address</strong></label>
                <textarea class="form-control" name="address" rows="3" required></textarea>
            </div>

            <div class="mb-3">
                <label class="form-label"><strong>Payment Method</strong></label>

                <select class="form-select" name="payment" required>
                    <option value="">Select Payment</option>
                    <option>Cash on Delivery</option>
                    <option>UPI</option>
                    <option>Credit Card</option>
                    <option>Debit Card</option>
                </select>
            </div>

            <h4 class="text-center mb-4">
                Total Amount : ₹{{ total }}
            </h4>

            <button type="submit" class="btn btn-success">
                Confirm Order
            </button>

        </form>

    </div>

</div>

</body>
</html>
