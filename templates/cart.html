<!DOCTYPE html>
<html>
<head>
    <title>Shopping Cart</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-5">

<h2>Your Cart</h2>

<table class="table table-bordered">

<tr>
    <th>Food Item</th>
    <th>Price</th>
    <th>Action</th>
</tr>

{% for item in cart %}

<tr>
    <td>{{ item.name }}</td>
    <td>₹{{ item.price }}</td>
    <td>
        <a href="{{ url_for('remove', index=loop.index0) }}"
           class="btn btn-danger btn-sm">
            Remove
        </a>
    </td>
</tr>

{% endfor %}

</table>

<h3>Total: ₹{{total}}</h3>

<a href="/menu" class="btn btn-secondary">
Continue Shopping
</a>

<a href="{{ url_for('clear') }}" class="btn btn-danger">
    Clear Cart
</a>

<a href="{{ url_for('checkout') }}" class="btn btn-success">
    Checkout
</a>

</div>

</body>
</html>
