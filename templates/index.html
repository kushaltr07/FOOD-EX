<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food-Ex</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">🍔 Food-Ex</a>

        <div>
    <a href="/" class="btn btn-outline-light me-2">Home</a>
    <a href="/menu" class="btn btn-warning me-2">Menu</a>
    <a href="/login" class="btn btn-success me-2">Login</a>
    <a href="/signup" class="btn btn-primary">Sign Up</a>
</div>
    </div>
</nav>

        </p>

        <a href="/menu" class="btn btn-danger btn-lg">

    </div>
</section>
